<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/bootstrap.css">
    <title>NEW TECH | Sri Lankans' Tech Mark</title>
    <link rel="icon" href="images/ntlogo.jpg" />
</head>

<body>
    <div class="view-popup-overlay" id="viewPopupOverlay">
        <div class="view-popup-container">
            <span class="view-close-btn" id="viewCloseBtn"><i class="bi bi-x-circle-fill"></i></span>
            <div class="view-popup-content">
                <div class="view-left-box">
                    <div class="view-carousel">
                        <div class="view-carousel-inner">
                            <img src="images/1.webp" alt="Product Image 1" class="view-main-image">
                            <img src="images/2.webp" alt="Product Image 2" class="view-main-image">
                            <img src="images/3.webp" alt="Product Image 3" class="view-main-image">
                            <img src="images/4.webp" alt="Product Image 4" class="view-main-image">
                            <img src="images/5.webp" alt="Product Image 5" class="view-main-image">
                            <img src="images/6.webp" alt="Product Image 6" class="view-main-image">
                            <img src="images/7.webp" alt="Product Image 7" class="view-main-image">
                        </div>
                        <button class="view-carousel-control prev" id="viewPrevBtn"><i class="bi bi-caret-left-fill h4 text-white"></i></button>
                        <button class="view-carousel-control next" id="viewNextBtn"><i class="bi bi-caret-right-fill h4 text-white"></i></button>
                    </div>
                </div>
                <div class="view-center-box">
                    <h1 class="view-product-name">New Gaming Laptop Celeron N5095</h1>
                    <p class="view-product-price">
                        <span class="view-original-price">LKR168,105.16</span>
                        <span class="view-sale-price">LKR 142,889.39</span>
                        <span class="view-discount">15% off</span>
                    </p>
                    <p class="view-product-description">New Gaming Laptop 15.6-inch HD Screen Intel Celeron N5095 Windows 11 System Dual Band WiFi 32GB RAM 1TB SSD Business Office Laptop</p>
                    <div class="view-product-rating">
                        <span class="view-stars">★★★★☆</span>
                        <span class="view-reviews">27 Reviews</span>
                        <span class="view-reviews">55 sold</span>
                    </div>
                    <div class="row col-12">
                        <div class="view-product-color col-6">
                            <label for="view-color">Color:</label>
                            <select id="view-color">
                                <option value="yellow">Silver</option>
                                <option value="black">Black</option>
                                <option value="black">Pink</option>
                            </select>
                        </div>
                        <div class="view-product-quantity col-6">
                            <label for="view-quantity">Quantity:</label>
                            <input type="number" id="view-quantity" name="quantity" min="1" max="5" value="1">
                        </div>
                        <p>See more..</p>
                    </div>
                </div>
                <div class="view-right-box">

                    <div class="view-delivery-info">
                        <p>Delivery: Within 3 days</p>
                        <p style="color: #00ffcc;">Free delivery</p>
                    </div>

                    <div class="view-product-actions">
                        <button class="view-btn view-wishlist-btn mt-lg-2"><b>Add to Wishlist</b></button>
                        <button class="view-btn view-cart-btn mt-lg-2"><b>Add to Cart</b></button>
                        <button class="view-btn view-buy-btn mt-lg-2"><b>Buy Now</b></button>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <script src="js/productviewscript.js"></script>
</body>

</html>
